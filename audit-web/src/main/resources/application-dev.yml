spring:
  datasource:
    url: jdbc:h2:mem:energy_audit;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
      continue-on-error: false
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: energy-audit-dev-secret-key-for-development-only-min-256-bits
  expiration: 86400000

logging:
  level:
    com.energy.audit: debug
    org.mybatis: debug
    org.springframework.jdbc: debug
    org.springframework.boot.autoconfigure.sql: debug
