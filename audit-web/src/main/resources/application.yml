server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    # Default to 'dev' (H2 in-memory) for local development.
    # IMPORTANT: Production deployments MUST override via SPRING_PROFILES_ACTIVE=prod
    # (already set in docker-compose.yml). Never rely on this default in production.
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  cache:
    type: jcache
    jcache:
      config: classpath:ehcache.xml
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.energy.audit.model.entity
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

logging:
  level:
    root: info
