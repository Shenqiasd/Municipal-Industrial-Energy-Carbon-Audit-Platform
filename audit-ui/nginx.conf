server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────
    # JSON responses (template_json / submission_json) average 320 KB,
    # max ~1.7 MB.  Gzip typically reduces them by 70-80 %.
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml;
    gzip_vary on;
    gzip_proxied any;

    # ── Static assets ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        client_max_body_size 100m;
    }
}
