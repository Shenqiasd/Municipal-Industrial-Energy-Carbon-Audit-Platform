version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: energy-audit-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: energy_audit
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: energy-audit-backend
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: energy_audit
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M

  frontend:
    build:
      context: ../audit-ui
      args:
        VITE_SPREADJS_LICENSE: ${VITE_SPREADJS_LICENSE}
        VITE_SPREADJS_DESIGNER_LICENSE: ${VITE_SPREADJS_DESIGNER_LICENSE}
    container_name: energy-audit-frontend
    restart: always
    ports:
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx-tencent.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  mysql_data:
