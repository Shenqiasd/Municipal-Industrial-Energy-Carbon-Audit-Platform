version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: energy-audit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: energy_audit_2024
      MYSQL_DATABASE: energy_audit
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: energy-audit-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: energy_audit
      DB_USERNAME: root
      DB_PASSWORD: energy_audit_2024
      JWT_SECRET: ${JWT_SECRET:-energy-audit-platform-2024-production-secret-key-minimum-256-bits}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./audit-ui
      dockerfile: Dockerfile
    container_name: energy-audit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
